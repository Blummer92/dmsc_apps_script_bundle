<script>
  const FIELD_NAMES = {
    unit: 'unit',
    lesson: 'lesson',
    packet: 'packet',
    outputType: 'output_type',
    readinessStatus: 'readiness_status'
  };

  const form = document.getElementById('searchForm');
  const messagePanel = document.getElementById('messagePanel');
  const resultsSummary = document.getElementById('resultsSummary');
  const resultsList = document.getElementById('resultsList');
  const configStatus = document.getElementById('configStatus');
  const readinessOptions = document.getElementById('readinessOptions');

  form.addEventListener('submit', function(event) {
    event.preventDefault();
    runSearch();
  });

  google.script.run
    .withSuccessHandler(renderBootstrap)
    .withFailureHandler(renderFailure)
    .getSearchBootstrap();

  function runSearch() {
    setLoading(true);
    clearMessage();
    resultsSummary.hidden = true;
    resultsList.innerHTML = '';

    google.script.run
      .withSuccessHandler(renderSearchResponse)
      .withFailureHandler(renderFailure)
      .searchCurriculum(getQuery(), getFilters());
  }

  function getQuery() {
    return document.getElementById('query').value.trim();
  }

  function getFilters() {
    const filters = {};
    filters[FIELD_NAMES.unit] = document.getElementById('unit').value.trim();
    filters[FIELD_NAMES.lesson] = document.getElementById('lesson').value.trim();
    filters[FIELD_NAMES.packet] = document.getElementById('packet').value.trim();
    filters[FIELD_NAMES.outputType] = document.getElementById('output_type').value;
    filters[FIELD_NAMES.readinessStatus] = document.getElementById('readiness_status').value;
    return filters;
  }

  function renderBootstrap(payload) {
    const status = payload.configStatus || {};
    const pieces = [];

    pieces.push(status.hasIndexSpreadsheet ? 'Sheet index configured' : 'Sheet index missing');
    pieces.push(status.enableDriveSearch ? 'Drive search on' : 'Drive search off');
    pieces.push('Limit ' + status.resultLimit);
    configStatus.textContent = pieces.join(' - ');
    renderReadinessOptions(status.readinessVocabulary || []);

    if (!status.hasIndexSpreadsheet) {
      renderMessage('Set CURRICULUM_SEARCH_INDEX_SPREADSHEET_ID before searching sheet metadata.', 'warning');
    }
  }

  function renderSearchResponse(response) {
    setLoading(false);

    if (response.duplicateCandidateGroups && response.duplicateCandidateGroups.length) {
      renderMessage(
        response.duplicateCandidateCount + ' duplicate candidate records detected across ' +
          response.duplicateCandidateGroups.length + ' group' +
          (response.duplicateCandidateGroups.length === 1 ? '' : 's') +
          '. Records are grouped for review only and were not merged.',
        'warning'
      );
    } else if (response.warnings && response.warnings.length) {
      renderMessage(response.warnings.join(' '), 'warning');
    } else {
      clearMessage();
    }

    resultsSummary.hidden = false;
    resultsSummary.textContent = response.resultCount + ' result' + (response.resultCount === 1 ? '' : 's') +
      ' found in ' + response.elapsedMs + ' ms. Read-only search; no records were merged or updated.';

    if (!response.results.length) {
      resultsList.innerHTML = '<article class="result-card"><h2>No matching records</h2><p class="result-meta">Try a broader keyword or fewer filters.</p></article>';
      return;
    }

    resultsList.innerHTML = renderResults(response);
  }

  function renderReadinessOptions(vocabulary) {
    readinessOptions.innerHTML = vocabulary.map(function(item) {
      return '<option value="' + escapeAttribute(item.value) + '">' + escapeHtml(item.label || item.value) + '</option>';
    }).join('');
  }

  function renderResults(response) {
    const groupedIds = {};
    const duplicateGroups = response.duplicateCandidateGroups || [];
    const groupedHtml = duplicateGroups.map(function(group) {
      group.records.forEach(function(record) {
        groupedIds[getResultIdentity(record)] = true;
      });

      return [
        '<section class="duplicate-group">',
        '<div class="duplicate-heading">',
        '<strong>Duplicate candidates</strong>',
        '<span>' + group.count + ' records - merge not performed</span>',
        '</div>',
        group.records.map(renderResult).join(''),
        '</section>'
      ].join('');
    }).join('');

    const ungroupedHtml = response.results
      .filter(function(result) {
        return !groupedIds[getResultIdentity(result)];
      })
      .map(renderResult)
      .join('');

    return groupedHtml + ungroupedHtml;
  }

  function renderResult(result) {
    const metadata = result.metadata || {};
    const tags = [
      result.type,
      metadata.unit,
      metadata.lesson,
      metadata.packet,
      metadata.readinessStatus
    ].filter(Boolean);

    return [
      '<article class="result-card">',
      '<div class="result-topline">',
      '<span class="source-badge">' + escapeHtml(result.sourceLabel || metadata.source_system || metadata.sourceSystem || 'Unknown Source') + '</span>',
      metadata.duplicateResolutionStatus ? '<span class="review-badge">' + escapeHtml(metadata.duplicateResolutionStatus) + '</span>' : '',
      '</div>',
      '<h2>' + escapeHtml(result.title || 'Untitled') + '</h2>',
      '<div class="result-tags">' + tags.map(renderTag).join('') + '</div>',
      '<p class="result-reason">' + escapeHtml(result.matchReason || 'Matched record') + '</p>',
      result.fileUrl ? '<a class="result-link" href="' + escapeAttribute(result.fileUrl) + '" target="_blank" rel="noopener">Open file</a>' : '',
      '</article>'
    ].join('');
  }

  function renderTag(value) {
    return '<span class="tag">' + escapeHtml(value) + '</span>';
  }

  function getResultIdentity(result) {
    const metadata = result.metadata || {};
    return [
      result.source || '',
      result.fileUrl || '',
      result.title || '',
      metadata.rowNumber || '',
      metadata.canonical_record_url || metadata.canonicalRecordUrl || ''
    ].join('|');
  }

  function renderFailure(error) {
    setLoading(false);
    renderMessage(error && error.message ? error.message : 'Search failed.', 'error');
  }

  function renderMessage(message, type) {
    messagePanel.hidden = false;
    messagePanel.className = 'message-panel ' + (type || '');
    messagePanel.textContent = message;
  }

  function clearMessage() {
    messagePanel.hidden = true;
    messagePanel.className = 'message-panel';
    messagePanel.textContent = '';
  }

  function setLoading(isLoading) {
    const button = form.querySelector('button[type="submit"]');
    button.disabled = isLoading;
    button.textContent = isLoading ? 'Searching...' : 'Search';
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }
</script>
