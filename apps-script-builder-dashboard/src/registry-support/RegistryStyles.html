<style>
  :root {
    color-scheme: light;
    --text: #222222;
    --muted: #636363;
    --line: #d8d8d8;
    --surface: #ffffff;
    --accent: #126b58;
    --warning: #9a5a00;
    --danger: #a63a3a;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    background: #f7f7f5;
    color: var(--text);
  }

  .page {
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }

  .header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  .eyebrow {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 8px;
    font-size: 28px;
  }

  .summary {
    margin-bottom: 0;
    color: var(--muted);
  }

  .section {
    margin-top: 24px;
  }

  .project-list {
    display: grid;
    gap: 12px;
  }

  .project,
  .empty {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }

  .project-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .project-title h3 {
    margin: 0;
  }

  .status {
    display: inline-flex;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--line);
  }

  .status.ready {
    color: var(--accent);
  }

  .status.blocked {
    color: var(--danger);
  }

  .status.missing {
    color: var(--warning);
  }

  .details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }

  .label {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 2px;
  }
</style>
