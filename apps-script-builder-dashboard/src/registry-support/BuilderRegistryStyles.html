<style>
  :root {
    color-scheme: light;
    --text: #222222;
    --muted: #636363;
    --line: #d8d8d8;
    --surface: #ffffff;
    --accent: #126b58;
    --warning: #9a5a00;
    --danger: #a63a3a;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    background: #f7f7f5;
    color: var(--text);
  }

  .page {
    max-width: 1120px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }

  .header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  .eyebrow {
    margin: 0 0 6px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
  }

  h1,
  h2 {
    margin: 0;
    letter-spacing: 0;
  }

  h1 {
    font-size: 32px;
  }

  h2 {
    font-size: 19px;
    margin-bottom: 12px;
  }

  .summary {
    color: var(--muted);
    margin: 10px 0 0;
  }

  .section {
    padding: 24px 0 0;
  }

  .project-list {
    display: grid;
    gap: 10px;
  }

  .project {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }

  .project-title {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .project-title h3 {
    margin: 0;
    font-size: 16px;
  }

  .status {
    border-radius: 999px;
    border: 1px solid var(--line);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 700;
  }

  .status.ready {
    color: var(--accent);
    border-color: var(--accent);
  }

  .status.blocked {
    color: var(--danger);
    border-color: var(--danger);
  }

  .status.missing {
    color: var(--warning);
    border-color: var(--warning);
  }

  .details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
    font-size: 13px;
  }

  .label {
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .empty {
    color: var(--muted);
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.5);
  }
</style>
